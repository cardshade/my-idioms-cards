<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idiom Galaxy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Idiom Galaxy</h1>
        
        <div class="deck-wrapper">
            <div id="active-card-container"></div>
        </div>

        <div id="counter">1 / 12</div>

        <div class="controls">
            <button id="prev-btn">← Back</button>
            <button id="next-btn">Next →</button>
        </div>
        
        <button id="test-mode-btn" class="secondary-btn">Test Mode</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
